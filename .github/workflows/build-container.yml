name: Build Container

on:
  push:
    branches:
      - main
    paths:
      - 'version.py'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1. Check out the repository.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1b. Read version (used for the release upload step below).
      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "exec(open('version.py').read()); print(__version__)")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      # Step 2. Download crop models
      - name: Download crop models
        run: bash scripts/download_models.sh

      # Step 3. Setup .NET (5.0 for datamill/celsius, 8.0 for APSIM)
      - name: Setup .NET 5.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '5.0.x'

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Step 4. Build all components (populates bin/ dirs required by Dockerfile COPY)
      - name: Build Datamill
        run: make build

      - name: Build Celsius
        run: make build_celsius

      - name: Build APSIM
        run: make build_apsim

      # Step 5. Set up Docker Buildx (optional but useful if you need multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6. (Optional) Login to Docker Hub or your preferred registry if you want to push images.
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 7. Build the Docker container using your Makefile target (dbuild).
      - name: Build Docker container
        run: make dbuild

      # Step 7b. Test the Docker image was built successfully.
      - name: Test Docker image
        run: |
          docker images | grep datamill
          echo "✓ Docker image built successfully"

      # Step 8. Install Apptainer (Singularity successor) for SIF container build.
      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          sudo ln -sf $(which apptainer) /usr/local/bin/singularity

      # Step 9. Build the Singularity container using your Makefile target (sbuild).
      - name: Build Singularity container
        run: make sbuild

      # Step 9. Package the build artifacts (e.g., datamill.tar.gz) using your Makefile target (pack).
      - name: Package container artifacts
        run: make pack

      # Step 10. Upload the package as an artifact for CI inspection.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datamill-container
          path: datamill.tar.gz
          retention-days: 7

      # Step 11. Upload datamill.sif to GitHub Release (on version.py change or tag push).
      # release.yml runs in parallel and creates the release; this step attaches the SIF.
      - name: Upload SIF to GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.version.outputs.tag }}
          files: datamill.sif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
