name: Build Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1. Check out the repository.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2. Set up Docker Buildx (optional but useful if you need multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3. (Optional) Login to Docker Hub or your preferred registry if you want to push images.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4. Build the Docker container using your Makefile target (dbuild).
      - name: Build Docker container
        run: make dbuild

      # Step 5. Build the Singularity container using your Makefile target (sbuild).
      - name: Build Singularity container
        run: make sbuild

      # Step 6. Package the build artifacts (e.g., datamill.tar.gz) using your Makefile target (pack).
      - name: Package container artifacts
        run: make pack

      # Step 7. Upload the package as an artifact for later download or inspection.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datamill-container
          path: datamill.tar.gz